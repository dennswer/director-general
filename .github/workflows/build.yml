name: Build Windows MSI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      # whisper.cpp needs cmake/clang; we use the Ninja generator because the
      # MSBuild generator picks the wrong VS edition in CI.
      CMAKE_GENERATOR: Ninja
      LIBCLANG_PATH: C:\Program Files\LLVM\bin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Ninja + LLVM (for whisper.cpp bindgen)
        run: |
          choco install ninja -y --no-progress
          choco install llvm -y --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Tauri build (CPU, self-signed bundle)
        # CPU build only — GitHub-hosted Windows runners don't ship CUDA.
        # Local users with a GPU rebuild with `--features cuda`.
        run: npm run tauri build

      - name: Upload installers
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: director-general-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload raw exe (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: director-general-exe
          path: src-tauri/target/release/director-general.exe
          if-no-files-found: warn
